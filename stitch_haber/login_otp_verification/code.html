        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background min-h-screen flex items-center justify-center p-md text-on-background font-text-md">
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl border border-outline-variant shadow-sm p-xl flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center mb-lg">
<span class="material-symbols-outlined text-display-md" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="text-center mb-xl">
<h1 class="text-display-xs font-display-xs text-on-surface mb-sm">Verify Identity</h1>
<p class="text-text-sm font-text-sm text-on-surface-variant">Enter the 6-digit code sent to your email</p>
</div>
<form class="w-full flex flex-col items-center">
<div class="flex justify-between w-full gap-sm mb-md">
<input aria-label="Digit 1" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-error-container bg-error-container border-2 border-danger rounded-lg focus:outline-none" maxlength="1" type="text" value="4"/>
<input aria-label="Digit 2" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-error-container bg-error-container border-2 border-danger rounded-lg focus:outline-none" maxlength="1" type="text" value="8"/>
<input aria-label="Digit 3" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-error-container bg-error-container border-2 border-danger rounded-lg focus:outline-none" maxlength="1" type="text" value="1"/>
<input aria-label="Digit 4" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-error-container bg-error-container border-2 border-danger rounded-lg focus:outline-none" maxlength="1" type="text" value="0"/>
<input aria-label="Digit 5" autofocus="" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-error-container bg-error-container border-2 border-danger rounded-lg focus:outline-none" maxlength="1" type="text" value=""/>
<input aria-label="Digit 6" class="w-12 h-14 text-center text-display-sm font-display-sm text-on-surface bg-surface border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary" maxlength="1" type="text" value=""/>
</div>
<div class="flex items-center gap-xs text-danger mb-xl w-full justify-center">
<span class="material-symbols-outlined text-[16px]">error</span>
<p class="text-text-sm font-text-sm">Invalid code. 3 attempts remaining</p>
</div>
<button class="w-full bg-primary hover:bg-brown-600 text-on-primary py-md rounded-lg text-text-md font-text-md font-medium transition-colors duration-200 shadow-sm flex items-center justify-center gap-sm" type="submit">
                Verify and Login
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="mt-lg text-center">
<p class="text-text-sm font-text-sm text-on-surface-variant">
                Didn't receive a code? 
                <a class="text-primary font-medium hover:text-brown-800 transition-colors duration-200" href="#">Resend code</a>
</p>
</div>
</main>
</body></html>
