version: '3.8'

services:
  node-app:
    build: .
    image: node-app
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/node_boilerplate
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    networks:
      - node-network

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=postgres
      - POSTGRES_DB=node_boilerplate
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - node-network

volumes:
  pgdata:

networks:
  node-network:
    driver: bridge