services:
  postgres:
    image: postgres:16-alpine
    container_name: haber-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-haber}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haberpassword}
      POSTGRES_DB: ${POSTGRES_DB:-haberdb}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-haber}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: haber-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-haber}:${POSTGRES_PASSWORD:-haberpassword}@postgres:5432/${POSTGRES_DB:-haberdb}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      RESEND_API_KEY: ${RESEND_API_KEY}
      OTP_EXPIRES_IN_MINUTES: ${OTP_EXPIRES_IN_MINUTES:-10}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost}
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: haber-client
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: haber-nginx
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - api

volumes:
  postgres_data: